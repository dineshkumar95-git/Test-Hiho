name: Pytest and Upload Report to Databricks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-upload:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1️⃣ Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # 2️⃣ Setup Python
      # -------------------------
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # -------------------------
      # 3️⃣ Install dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report requests

      # -------------------------
      # 4️⃣ Run pytest and generate JSON report
      # -------------------------
      - name: Run pytest
        run: |
          pytest \
            --json-report \
            --json-report-file=pytest_report.json

      # -------------------------
      # 5️⃣ Upload report as GitHub artifact
      # -------------------------
      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest_report.json

      # -------------------------
      # 6️⃣ Upload report to Databricks Workspace
      #    ✅ Adds CI metadata
      #    ✅ Creates folder if missing
      
      #    ✅ Uploads JSON
      # -------------------------
      - name: Upload pytest report to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python << 'EOF'
          import base64
          import requests
          import os
          import json
          import sys

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}"
          }

          # -------------------------
          # Add CI metadata to pytest report
          # -------------------------
          with open("pytest_report.json", "r") as f:
              report = json.load(f)

          report["ci_metadata"] = {
              "commit_sha": os.environ.get("GIT_SHA"),
              "branch": os.environ.get("GIT_BRANCH"),
              "run_id": os.environ.get("RUN_ID")
          }

          with open("pytest_report.json", "w") as f:
              json.dump(report, f)

          # -------------------------
          # Ensure workspace folder exists
          # -------------------------
          requests.post(
              f"{host}/api/2.0/workspace/mkdirs",
              headers=headers,
              json={"path": "/Shared/pytest"}
          )

          # -------------------------
          # Upload pytest JSON to Databricks Workspace
          # -------------------------
          with open("pytest_report.json", "rb") as f:
              content = base64.b64encode(f.read()).decode("utf-8")

          response = requests.post(
              f"{host}/api/2.0/workspace/import",
              headers=headers,
              json={
                  "path": "/Shared/pytest/pytest_report.json",
                  "overwrite": True,
                  "format": "AUTO",
                  "content": content
              }
          )

          response.raise_for_status()
          print("✅ Pytest report uploaded to Databricks Workspace")
          EOF
