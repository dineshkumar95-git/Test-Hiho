name: Pytest CI


on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-json-report requests

      - name: Run pytest with JSON report
        run: |
          pytest --json-report --json-report-file=pytest_report.json

      # ✅ Optional: keep GitHub artifact
      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest_report.json

      # ✅ IMPORTANT: upload to Databricks
      - name: Upload pytest report to Databricks DBFS
        run: |
          import base64, requests, os

          host = os.environ["DATABRICKS_HOST"]
          token = os.environ["DATABRICKS_TOKEN"]

          with open("pytest_report.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          payload = {
              "path": "dbfs:/tmp/pytest/pytest_report.json",
              "overwrite": True,
              "contents": content
          }

          headers = {
              "Authorization": f"Bearer {token}"
          }

          response = requests.post(
              f"{host}/api/2.0/dbfs/put",
              headers=headers,
              json=payload
          )

          response.raise_for_status()
        shell: python
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
