
name: Pytest and Upload Report to Databricks

on:
  push:
    branches: [ main ]
  # workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # -------------------------------------------------
      # Generate release metadata (date + short SHA)
      # -------------------------------------------------
      - name: Set release metadata
        run: |
          echo "RELEASE_DATE=$(date -u +%Y%m%d)" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # -------------------------------------------------
      # Install dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report requests

      # -------------------------------------------------
      # Run pytest and generate JSON report
      # -------------------------------------------------
      - name: Run pytest
        run: |
          pytest \
            --json-report \
            --json-report-file=pytest_report.json
        continue-on-error: true

      # -------------------------------------------------
      # Upload pytest report as GitHub artifact
      # -------------------------------------------------
      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest_report.json

      # -------------------------------------------------
      # Upload enriched pytest report to Databricks Workspace
      # -------------------------------------------------
      - name: Upload pytest report to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          RELEASE_NAME: ${{ github.ref_name }}-${{ env.RELEASE_DATE }}-${{ env.SHORT_SHA }}
        run: |
          python << 'EOF'
          import json
          import base64
          import requests
          import os

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}"
          }

          # Load pytest report
          with open("pytest_report.json") as f:
              report = json.load(f)

          # Inject CI metadata
          report["ci_metadata"] = {
              "release_name": os.environ["RELEASE_NAME"],
              "commit_sha": os.environ["GIT_SHA"],
              "branch": os.environ["GIT_BRANCH"]
          }

          # Save enriched report
          with open("pytest_report.json", "w") as f:
              json.dump(report, f, indent=2)

          # Ensure Databricks workspace directory exists
          requests.post(
              f"{host}/api/2.0/workspace/mkdirs",
              headers=headers,
              json={"path": "/Shared/pytest"}
          )

          # Upload report to Databricks Workspace
          with open("pytest_report.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          response = requests.post(
              f"{host}/api/2.0/workspace/import",
              headers=headers,
              json={
                  "path": "/Shared/pytest/pytest_report.json",
                  "overwrite": True,
                  "format": "AUTO",
                  "content": content
              }
          )

          response.raise_for_status()
          print("✅ Pytest report uploaded to Databricks Workspace")
          EOF

  # -------------------------------------------------
  # Trigger Databricks ingestion job
  # -------------------------------------------------
  trigger-databricks-job:
    needs: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Databricks ingestion job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          TESTS_JOB_ID: ${{ secrets.TESTS_JOB_ID }}
        run: |
          python << 'EOF'
          import os
          import requests

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]
          job_id = int(os.environ["TESTS_JOB_ID"])

          headers = {
              "Authorization": f"Bearer {token}"
          }

          response = requests.post(
              f"{host}/api/2.1/jobs/run-now",
              headers=headers,
              json={"job_id": job_id}
          )

          response.raise_for_status()
          print("✅ Databricks ingestion job triggered")
          EOF
