name: Pytest and Upload Report to Databricks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-upload:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1️⃣ Checkout code
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # 2️⃣ Setup Python
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # -------------------------
      # 3️⃣ Install dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report requests

      # -------------------------
      # 4️⃣ Run pytest and generate JSON report
      # -------------------------
      - name: Run pytest
        run: |
          pytest \
            --json-report \
            --json-report-file=pytest_report.json

      # -------------------------
      # 5️⃣ Upload report as GitHub artifact
      # -------------------------
      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest_report.json

      # -------------------------
      # 6️⃣ Upload report to Databricks Workspace
      # ✅ CORRECT API (workspace/import)
      # -------------------------
      - name: Upload pytest report to Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python << 'EOF'
          import base64
          import requests
          import os
          import sys

          host = os.environ.get("DATABRICKS_HOST", "").rstrip("/")
          token = os.environ.get("DATABRICKS_TOKEN", "")

          if not host or not token:
              print("❌ Missing Databricks secrets")
              sys.exit(1)

          headers = {
              "Authorization": f"Bearer {token}"
          }

          with open("pytest_report.json", "rb") as f:
              content = base64.b64encode(f.read()).decode("utf-8")

          payload = {
              "path": "/Shared/pytest/pytest_report.json",
              "overwrite": True,
              "format": "AUTO",
              "content": content
          }

          response = requests.post(
              f"{host}/api/2.0/workspace/import",
              headers=headers,
              json=payload
          )

          print("Status code:", response.status_code)
          print("Response:", response.text)

          response.raise_for_status()
          print("✅ Pytest report uploaded successfully to Databricks Workspace")
          EOF
