name: Pytest and Upload Report to Databricks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  test-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report requests

      - name: Run pytest
        run: |
          pytest \
            --json-report \
            --json-report-file=pytest_report.json
        continue-on-error: true

      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest_report.json

      - name: Upload pytest report to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python << 'EOF'
          import json, base64, requests, os

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]

          headers = {"Authorization": f"Bearer {token}"}

          with open("pytest_report.json") as f:
              report = json.load(f)

          report["ci_metadata"] = {
              "commit_sha": os.environ["GIT_SHA"],
              "branch": os.environ["GIT_BRANCH"],
              "run_id": os.environ["RUN_ID"]
          }

          with open("pytest_report.json", "w") as f:
              json.dump(report, f)

          requests.post(
              f"{host}/api/2.0/workspace/mkdirs",
              headers=headers,
              json={"path": "/Shared/pytest"}
          )

          with open("pytest_report.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          requests.post(
              f"{host}/api/2.0/workspace/import",
              headers=headers,
              json={
                  "path": "/Shared/pytest/pytest_report.json",
                  "overwrite": True,
                  "format": "AUTO",
                  "content": content
              }
          ).raise_for_status()

          print("✅ Pytest report uploaded")
          EOF

      - name: Trigger Databricks ingestion job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python << 'EOF'
          import os, requests

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]
          job_id = 804179091689343   # ✅ HARD-CODED JOB ID

          headers = {"Authorization": f"Bearer {token}"}

          requests.post(
              f"{host}/api/2.1/jobs/run-now",
              headers=headers,
              json={"job_id": job_id}
          ).raise_for_status()

          print("✅ Databricks job triggered")
          EOF
