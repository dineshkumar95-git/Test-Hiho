name: Pytest and Upload Report to Databricks

on:
  push:
    branches:
      - main
      - develop
      - release/**


jobs:
  pytest:
    runs-on: ubuntu-latest

    # 🔑 Environment selected based on branch
    environment: >-
      ${{
        github.ref == 'refs/heads/develop' && 'dev' ||
        startsWith(github.ref, 'refs/heads/release/') && 'tst' ||
        github.ref == 'refs/heads/main' && 'prd'
      }}

    steps:
      # ---------------------------------------
      # Checkout
      # ---------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------
      # Python setup
      # ---------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # ---------------------------------------
      # Metadata
      # ---------------------------------------
      - name: Set release metadata
        run: |
          echo "RELEASE_DATE=$(date -u +%Y%m%d)" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "ENVIRONMENT=${{ job.environment }}" >> $GITHUB_ENV

      # ---------------------------------------
      # Install dependencies
      # ---------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report requests

      # ---------------------------------------
      # Run pytest (CI Gate)
      # ---------------------------------------
      - name: Run pytest
        run: |
          pytest \
            --json-report \
            --json-report-file=pytest_report.json
        continue-on-error: true

      # ---------------------------------------
      # Upload pytest report as GitHub artifact
      # ---------------------------------------
      - name: Upload pytest report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ env.ENVIRONMENT }}
          path: pytest_report.json

      # ---------------------------------------
      # Upload enriched pytest report to Databricks
      # ---------------------------------------
      - name: Upload pytest report to Databricks Workspace
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          RELEASE_NAME: >-
            ${{ env.ENVIRONMENT }}-${{ github.ref_name }}-${{ env.RELEASE_DATE }}-${{ env.SHORT_SHA }}
        run: |
          python << 'EOF'
          import json, base64, requests, os

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]

          headers = {"Authorization": f"Bearer {token}"}

          with open("pytest_report.json") as f:
              report = json.load(f)

          report["ci_metadata"] = {
              "environment": os.environ["ENVIRONMENT"],
              "release_name": os.environ["RELEASE_NAME"],
              "commit_sha": os.environ["GIT_SHA"],
              "branch": os.environ["GIT_BRANCH"]
          }

          with open("pytest_report.json", "w") as f:
              json.dump(report, f, indent=2)

          requests.post(
              f"{host}/api/2.0/workspace/mkdirs",
              headers=headers,
              json={"path": f"/Shared/pytest/{os.environ['ENVIRONMENT']}"}
          )

          with open("pytest_report.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          resp = requests.post(
              f"{host}/api/2.0/workspace/import",
              headers=headers,
              json={
                  "path": f"/Shared/pytest/{os.environ['ENVIRONMENT']}/pytest_report.json",
                  "overwrite": True,
                  "format": "AUTO",
                  "content": content
              }
          )

          resp.raise_for_status()
          print("✅ Pytest report uploaded to Databricks")
          EOF

  # -------------------------------------------------
  # Trigger Databricks ingestion job (TST + PRD only)
  # -------------------------------------------------
  trigger-databricks-job:
    needs: pytest
    runs-on: ubuntu-latest
    if: ${{ needs.pytest.environment != 'dev' }}
    environment: ${{ needs.pytest.environment }}

    steps:
      - name: Trigger Databricks ingestion job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          TESTS_JOB_ID: ${{ secrets.TESTS_JOB_ID }}
        run: |
          python << 'EOF'
          import os, requests

          host = os.environ["DATABRICKS_HOST"].rstrip("/")
          token = os.environ["DATABRICKS_TOKEN"]
          job_id = 971731078580378 #int(os.environ["TESTS_JOB_ID"])

          headers = {"Authorization": f"Bearer {token}"}

          resp = requests.post(
              f"{host}/api/2.1/jobs/run-now",
              headers=headers,
              json={"job_id": job_id}
          )

          resp.raise_for_status()
          print("✅ Databricks ingestion job triggered")
          EOF
